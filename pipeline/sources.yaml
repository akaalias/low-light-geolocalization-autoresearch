# FROZEN (see /FROZEN) — imagery source registry for pipeline/fetch.py.
#
# The pipeline code is bbox-generic; regional knowledge lives HERE as data.
# For a given bbox, fetch.py picks the finest-resolution source whose coverage
# bbox fully contains it, falling back to the global Sentinel-2 entry.
# Adding a region = adding an entry, never editing pipeline code.
#
# All entries must be open-licensed (dl-de/by-2-0, CC BY 4.0, or Copernicus).
# coverage: [west, south, east, north] EPSG:4326.

target_gsd_m: 1.0   # reference ground resolution to fetch at (UAV @ ~100 m AGL)

sources:
  - name: dop20_brandenburg_berlin
    kind: wms
    coverage: [11.20, 51.30, 14.80, 53.60]
    url: "https://isk.geobasis-bb.de/mapproxy/dop20c/service/wms"
    layer: bebb_dop20c
    wms_version: "1.3.0"
    native_gsd_m: 0.2
    attribution: "© GeoBasis-DE/LGB, dl-de/by-2-0 (data modified)"

  - name: dop40_bavaria
    kind: wms
    coverage: [8.95, 47.25, 13.95, 50.60]
    url: "https://geoservices.bayern.de/od/wms/dop/v1/dop40"
    layer: by_dop40c
    wms_version: "1.1.1"
    native_gsd_m: 0.4
    attribution: "© Bayerische Vermessungsverwaltung, CC BY 4.0 (data modified)"

  - name: dop20_hesse
    kind: wms
    coverage: [7.70, 49.38, 10.25, 51.70]
    url: "https://www.gds-srv.hessen.de/cgi-bin/lika-services/ogc-free-images.ows"
    layer: he_dop20_rgb
    wms_version: "1.3.0"
    native_gsd_m: 0.2
    attribution: "© HVBG Hessen, dl-de/by-2-0 (data modified)"

  - name: dop20_hamburg
    kind: wms
    coverage: [9.70, 53.38, 10.35, 53.75]
    url: "https://geodienste.hamburg.de/wms_dop_zeitreihe_unbelaubt"
    layer: dop_zeitreihe_unbelaubt
    wms_version: "1.3.0"
    native_gsd_m: 0.2
    attribution: "© Freie und Hansestadt Hamburg, LGV, dl-de/by-2-0 (data modified)"

  - name: sentinel2_global
    kind: sentinel2_stac
    coverage: [-180.0, -90.0, 180.0, 90.0]
    native_gsd_m: 10.0
    attribution: "Contains modified Copernicus Sentinel data"
